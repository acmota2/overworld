---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: psql-musmgr-cluster
  namespace: db
spec:
  instances: 1
  storage:
    size: 1Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: musmgr
      owner: musmgr
  managed:
    roles:
      - name: musmgr
        ensure: present
        login: true
        passwordSecret:
          name: psql-musmgr-creds
  monitoring:
    enablePodMonitor: true
  resources:
    requests:
      cpu: 500m
      memory: "1Gi"
    limits:
      cpu: 1000m
      memory: "1.5Gi"

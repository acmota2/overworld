---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: flux-system
spec:
  interval: 5m0s
  chart:
    spec:
      chart: app-template
      version: "4.4.0"
      sourceRef:
        kind: HelmRepository
        name: app-template
        namespace: flux-system
  targetNamespace: musmgr
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 5
  values:
    imagePullSecrets:
      - name: ghcr-secret
    route:
      main:
        enabled: false
    resources:
      requests:
        memory: "256Mi"
        cpu: "300m"
      limits:
        memory: "768Mi"
        cpu: "500m"

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: musmgr
  namespace: flux-system
spec:
  interval: 5m0s
  chart:
    spec:
      chart: app-template
      version: "4.4.0"
      sourceRef:
        kind: HelmRepository
        name: app-template
        namespace: flux-system
  targetNamespace: musmgr
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: false
    remediation:
      retries: 5
  values:
    imagePullSecrets:
      - name: ghcr-secret
    controllers:
      backend:
        containers:
          backend:
            env:
              MINIO_ENDPOINT: platform-minio.platform.svc.cluster.local:9000
              MINIO_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: minio-creds
                    key: username
              MINIO_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: minio-creds
                    key: password
              MINIO_BUCKET_NAME: "musmgr-obj"
              MINIO_BUCKET_REGION: "us-east-1"
              MINIO_SSL: false
              POSTGRES_DB: musmgr
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: musmgr-db
                    key: username
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: musmgr-db
                    key: password
              POSTGRES_HOST: psql-musmgr-cluster-rw.db.svc.cluster.local
              TRUSTED_PROXIES: "home.localhost:8080"
              ALLOWED_ADMIN_DOMAINS: '["http://musmgr-admin.home.localhost"]'
              ALLOWED_PUBLIC_DOMAINS: '["http://musmgr.home.localhost"]'
              GIN_MODE: release
          frontend-public:
            env:
              API_URL: http://musmgr-api.home.localhost:8080
          frontend-admin:
            env:
              API_URL: http://musmgr-api-admin.home.localhost:8080
    route:
      main:
        enabled: false
    resources:
      requests:
        memory: "256Mi"
        cpu: "300m"
      limits:
        memory: "768Mi"
        cpu: "500m"

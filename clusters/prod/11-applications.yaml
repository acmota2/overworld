---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 11-applications
  namespace: flux-system
spec:
  interval: 2m30s
  path: ../../apps/overlays/dev/11-applications/
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: 10-app-infra
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: base-map
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: psql-musmgr-cluster
      namespace: db

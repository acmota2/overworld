---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 04-services
  namespace: flux-system
spec:
  interval: 2m30s
  path: ../../infrastructure/overlays/dev/03-services
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: 02-backends
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: base-map
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: dragonfly-dragonfly-operator
      namespace: db
    - apiVersion: external-secrets.io/v1
      kind: ClusterSecretStore
      name: databases-secret-store
    - apiVersion: v1
      kind: Secret
      name: immich-db-creds
      namespace: db

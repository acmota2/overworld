---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 10-app-infra
  namespace: flux-system
spec:
  interval: 2m30s
  path: ../../apps/overlays/dev/10-app-infra/
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: 03-services
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: base-map

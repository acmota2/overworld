---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/main/config/crd/standard/gateway.networking.k8s.io_httproutes.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: musmgr-backend-admin-http-route
  namespace: musmgr
spec:
  parentRefs:
    - name: internal-gateway
      namespace: networking
  hostnames:
    - musmgr-api-admin.${INTERNAL_ADDRESS}
  rules:
    - backendRefs:
        - name: musmgr-musmgr-backend
          port: 4700
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/main/config/crd/standard/gateway.networking.k8s.io_httproutes.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: musmgr-backend-public-http-route
  namespace: musmgr
spec:
  parentRefs:
    - name: internal-gateway
      namespace: networking
  hostnames:
    - musmgr-api.${INTERNAL_ADDRESS}
  rules:
    - backendRefs:
        - name: musmgr-musmgr-backend
          port: 4700
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/main/config/crd/standard/gateway.networking.k8s.io_httproutes.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: musmgr-frontend-public-http-route
  namespace: musmgr
spec:
  parentRefs:
    - name: internal-gateway
      namespace: networking
  hostnames:
    - musmgr.${INTERNAL_ADDRESS}
  rules:
    - backendRefs:
        - name: musmgr-musmgr-public
          port: 3000
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/main/config/crd/standard/gateway.networking.k8s.io_httproutes.yaml
apiVersion: gateway.networking.k8s.io/v1

  namespace: musmgr
spec:
  parentRefs:
    - name: internal-gateway
      namespace: networking
  hostnames:
    - musmgr-admin.${INTERNAL_ADDRESS}
  rules:
    - backendRefs:
        - name: musmgr-musmgr-admin

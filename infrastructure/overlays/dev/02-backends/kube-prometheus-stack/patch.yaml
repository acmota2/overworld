---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 1h
  values:
    grafana:
      persistence:
        enabled: true
        storageClassName: local-path
        accessModes:
          - "ReadWriteOnce"
        size: 1Gi
      ingress:
        enabled: false
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

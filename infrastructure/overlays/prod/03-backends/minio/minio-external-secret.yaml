---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-creds
  namespace: platform
spec:
  refreshInterval: 1m0s
  secretStoreRef:
    name: secrets-secret-store
    kind: ClusterSecretStore
  target:
    name: minio-creds
  data:
    - secretKey: username
      remoteRef:
        key: minio-creds
        property: username
    - secretKey: password
      remoteRef:
        key: minio-creds
        property: password
